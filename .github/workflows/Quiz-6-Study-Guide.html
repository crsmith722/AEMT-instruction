    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <style>

        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

    </style>

<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

    <!-- Main App Container -->
    <div id="app"></div>

    <script>
        // --- 1. QUIZ DATA ---
        const QUIZ_DATA = [
            // Section 1: Neurological Emergencies
            {
                id: 1, category: "Neurological Emergencies",
                text: "Which of the following medications in a patient's medical history would most strongly suggest an underlying seizure disorder?",
                options: [
                    { id: "A", text: "Keppra" }, { id: "B", text: "Metoprolol" },
                    { id: "C", text: "Lisinopril" }, { id: "D", text: "Albuterol" }
                ],
                correctAnswer: "A",
                explanation: "Keppra (levetiracetam) is a common anticonvulsant medication used to treat epilepsy. Metoprolol is a beta-blocker (hypertension/tachycardia). Lisinopril is an ACE inhibitor (hypertension/heart failure). Albuterol is a bronchodilator (asthma/COPD)."
            },
            {
                id: 2, category: "Neurological Emergencies",
                text: "You are treating a patient with an altered mental status. Finding which of the following prescription bottles on their nightstand would indicate a history of epilepsy?",
                options: [
                    { id: "A", text: "Phenytoin" }, { id: "B", text: "Furosemide" },
                    { id: "C", text: "Metformin" }, { id: "D", text: "Omeprazole" }
                ],
                correctAnswer: "A",
                explanation: "Phenytoin (Dilantin) is a classic antiepileptic drug used to control seizures. Furosemide is a diuretic. Metformin is for Type II Diabetes. Omeprazole is for GERD/ulcers."
            },
            {
                id: 3, category: "Neurological Emergencies",
                text: "A 65-year-old male with chronic hypertension suddenly complains of the 'worst headache of his life' before rapidly losing consciousness. You should most highly suspect:",
                options: [
                    { id: "A", text: "A subarachnoid hemorrhage" }, { id: "B", text: "A transient ischemic attack" },
                    { id: "C", text: "A migraine headache" }, { id: "D", text: "An acute ischemic stroke" }
                ],
                correctAnswer: "A",
                explanation: "The classic presentation of a ruptured cerebral aneurysm causing a subarachnoid hemorrhage is a sudden, explosive 'thunderclap' headache, often followed by a rapid loss of consciousness. TIAs and Ischemic strokes rarely present with explosive headaches. Migraines build over time."
            },
            {
                id: 4, category: "Neurological Emergencies",
                text: "The rapid deterioration of a patient's neurological status following the sudden onset of a severe headache is a hallmark sign of:",
                options: [
                    { id: "A", text: "Hypoglycemia" }, { id: "B", text: "An occlusive stroke" },
                    { id: "C", text: "A ruptured cerebral vessel" }, { id: "D", text: "A grand mal seizure" }
                ],
                correctAnswer: "C",
                explanation: "A ruptured vessel (hemorrhagic stroke) causes rapid bleeding into the brain, drastically increasing intracranial pressure, leading to a sudden severe headache and rapid neurological decline."
            },
            {
                id: 5, category: "Neurological Emergencies",
                text: "Focal-onset aware seizures (formerly simple partial seizures) that present with auditory hallucinations or unusual smells typically originate in which cerebral lobe?",
                options: [
                    { id: "A", text: "Frontal" }, { id: "B", text: "Occipital" },
                    { id: "C", text: "Parietal" }, { id: "D", text: "Temporal" }
                ],
                correctAnswer: "D",
                explanation: "The temporal lobe is deeply involved in processing auditory and olfactory information. Seizures originating here often produce auras consisting of strange smells or sounds."
            },
            {
                id: 6, category: "Neurological Emergencies",
                text: "The temporal lobe is the most common site of origin for which type of neurological event?",
                options: [
                    { id: "A", text: "Brainstem herniation" }, { id: "B", text: "Focal-onset seizures" },
                    { id: "C", text: "Epidural hematomas" }, { id: "D", text: "Ischemic lacunar infarcts" }
                ],
                correctAnswer: "B",
                explanation: "The temporal lobe is the most highly epileptogenic region of the brain, making it the most common site for focal seizures."
            },
            {
                id: 7, category: "Neurological Emergencies",
                text: "A patient experiencing a stroke in the cerebellum will most likely present with which profound deficit?",
                options: [
                    { id: "A", text: "Blindness in one eye" }, { id: "B", text: "Loss of speech and language comprehension" },
                    { id: "C", text: "Severe ataxia and loss of coordination" }, { id: "D", text: "Inability to form new memories" }
                ],
                correctAnswer: "C",
                explanation: "The cerebellum controls balance, coordination, and fine motor skills. A stroke here results in ataxia (staggering gait) and clumsiness."
            },
            {
                id: 8, category: "Neurological Emergencies",
                text: "Which neuroanatomical structure is primarily responsible for fine-tuning motor movements and maintaining balance?",
                options: [
                    { id: "A", text: "The cerebellum" }, { id: "B", text: "The cerebrum" },
                    { id: "C", text: "The brainstem" }, { id: "D", text: "The diencephalon" }
                ],
                correctAnswer: "A",
                explanation: "The cerebellum is located beneath the cerebrum and coordinates voluntary movements, posture, and balance."
            },
            {
                id: 9, category: "Neurological Emergencies",
                text: "In a hemorrhagic stroke, what is the primary pathophysiological mechanism causing the patient's rapidly declining level of consciousness?",
                options: [
                    { id: "A", text: "Systemic hypovolemia" }, { id: "B", text: "Rapidly increasing intracranial pressure (ICP)" },
                    { id: "C", text: "Widespread cerebral vasodilation" }, { id: "D", text: "Blockage of a major cerebral artery by a clot" }
                ],
                correctAnswer: "B",
                explanation: "Bleeding into the closed space of the skull compresses brain tissue and prevents oxygenated blood from entering the brain, causing a rapid decline in consciousness."
            },
            {
                id: 10, category: "Neurological Emergencies",
                text: "The accumulation of blood within the rigid cranial vault during an intracerebral hemorrhage leads directly to:",
                options: [
                    { id: "A", text: "Decreased intracranial pressure" }, { id: "B", text: "Compression of brain tissue and rising intracranial pressure" },
                    { id: "C", text: "An immediate drop in systemic blood pressure" }, { id: "D", text: "Increased cerebral perfusion pressure" }
                ],
                correctAnswer: "B",
                explanation: "Because the skull cannot expand, any added volume (blood) directly compresses the soft brain tissue and drives up ICP. Systemic blood pressure will actually increase (Cushing's reflex) to fight the high ICP."
            },
            {
                id: 11, category: "Neurological Emergencies",
                text: "During a generalized tonic-clonic seizure, the phase characterized by rhythmic, jerking movements of the extremities is known as the:",
                options: [
                    { id: "A", text: "Tonic phase" }, { id: "B", text: "Aura phase" },
                    { id: "C", text: "Clonic phase" }, { id: "D", text: "Postictal phase" }
                ],
                correctAnswer: "C",
                explanation: "The clonic phase is the period of alternating muscle contraction and relaxation, causing the visible rhythmic jerking. The tonic phase is continuous muscle rigidity."
            },
            {
                id: 12, category: "Neurological Emergencies",
                text: "Which description best characterizes the clonic portion of a generalized seizure?",
                options: [
                    { id: "A", text: "Continuous, rigid muscle contraction" }, { id: "B", text: "Alternating muscle contraction and relaxation" },
                    { id: "C", text: "A period of profound sleepiness" }, { id: "D", text: "A sensory warning prior to the seizure" }
                ],
                correctAnswer: "B",
                explanation: "This is the physiological definition of clonus. Continuous rigid contraction is the 'tonic' phase. Sleepiness is the 'postictal' phase."
            },
            {
                id: 13, category: "Neurological Emergencies",
                text: "You are treating a patient with a suspected hemorrhagic stroke. Their blood pressure is 210/110 mmHg. This severe hypertension is most likely a physiological response aiming to:",
                options: [
                    { id: "A", text: "Overcome increased intracranial pressure and maintain cerebral perfusion" }, { id: "B", text: "Prepare the body for a 'fight or flight' response" },
                    { id: "C", text: "Prevent further bleeding in the brain by constricting vessels" }, { id: "D", text: "Increase urine output to lower blood volume" }
                ],
                correctAnswer: "A",
                explanation: "This is Cushing's reflex. The body drastically raises systemic blood pressure to force oxygenated blood into the brain against the extreme resistance of the high intracranial pressure."
            },
            {
                id: 14, category: "Neurological Emergencies",
                text: "As intracranial pressure rises due to bleeding in the brain, the body's compensatory mechanism is to:",
                options: [
                    { id: "A", text: "Decrease the heart rate and lower blood pressure" }, { id: "B", text: "Systemically vasodilate to pool blood in the extremities" },
                    { id: "C", text: "Increase mean arterial pressure to force blood into the compressed cerebral tissues" }, { id: "D", text: "Hyperventilate to increase arterial CO2 levels" }
                ],
                correctAnswer: "C",
                explanation: "To maintain Cerebral Perfusion Pressure (CPP), the Mean Arterial Pressure (MAP) must rise higher than the Intracranial Pressure (ICP)."
            },
            {
                id: 15, category: "Neurological Emergencies",
                text: "A seemingly healthy 25-year-old collapses from a spontaneous subarachnoid hemorrhage. The most common underlying etiology for this event in a young, healthy patient is a(n):",
                options: [
                    { id: "A", text: "Ruptured berry/saccular aneurysm" }, { id: "B", text: "Embolic shower from atrial fibrillation" },
                    { id: "C", text: "Carotid artery dissection" }, { id: "D", text: "Atherosclerotic plaque rupture" }
                ],
                correctAnswer: "A",
                explanation: "Saccular (berry) aneurysms are congenital weak spots in cerebral arteries. They can rupture spontaneously in young, otherwise healthy people."
            },
            {
                id: 16, category: "Neurological Emergencies",
                text: "Which congenital vascular malformation is a frequent cause of hemorrhagic stroke in young adults when it ruptures?",
                options: [
                    { id: "A", text: "Deep vein thrombosis" }, { id: "B", text: "Saccular aneurysm" },
                    { id: "C", text: "Ventricular septal defect" }, { id: "D", text: "Patent ductus arteriosus" }
                ],
                correctAnswer: "B",
                explanation: "Also known as berry aneurysms, these are common congenital defects in the Circle of Willis that can rupture under pressure."
            },
            {
                id: 17, category: "Neurological Emergencies",
                text: "When utilizing the Cincinnati Prehospital Stroke Scale, you ask the patient to repeat the phrase, 'You can't teach an old dog new tricks.' What are you assessing for?",
                options: [
                    { id: "A", text: "Aphasia or dysarthria" }, { id: "B", text: "Facial droop" },
                    { id: "C", text: "Memory recall" }, { id: "D", text: "Pronator drift" }
                ],
                correctAnswer: "A",
                explanation: "Having the patient repeat a complex sentence tests for both aphasia (inability to understand/produce language) and dysarthria (slurred speech due to muscle weakness)."
            },
            {
                id: 18, category: "Neurological Emergencies",
                text: "A prehospital stroke assessment using the Cincinnati Prehospital Stroke Scale evaluates three specific parameters: facial droop, arm drift, and:",
                options: [
                    { id: "A", text: "Pupillary response" }, { id: "B", text: "Blood glucose level" },
                    { id: "C", text: "Speech abnormalities" }, { id: "D", text: "Grip strength" }
                ],
                correctAnswer: "C",
                explanation: "The CPSS relies on three tests: Facial droop (smile), Arm drift (hold arms out), and Speech (repeat a sentence)."
            },
            {
                id: 19, category: "Neurological Emergencies",
                text: "Brainstem herniation places direct, life-threatening pressure on the medulla oblongata, which controls:",
                options: [
                    { id: "A", text: "Vision and hearing" }, { id: "B", text: "Higher cognitive functions and personality" },
                    { id: "C", text: "Voluntary muscle movements" }, { id: "D", text: "Vital functions such as heart rate, blood pressure, and respirations" }
                ],
                correctAnswer: "D",
                explanation: "The medulla oblongata is the brain's autonomic control center for the cardiovascular and respiratory systems."
            },
            {
                id: 20, category: "Neurological Emergencies",
                text: "A patient with severe traumatic brain injury develops bradycardia, hypertension, and a distinctly irregular respiratory pattern. These vital sign changes indicate compression of which brain structure?",
                options: [
                    { id: "A", text: "The frontal lobe" }, { id: "B", text: "The cerebellum" },
                    { id: "C", text: "The medulla oblongata" }, { id: "D", text: "The optic nerve" }
                ],
                correctAnswer: "C",
                explanation: "These vital signs represent Cushing's Triad, which occurs when brain herniation compresses the brainstem (specifically the medulla)."
            },

            // Section 2: Abdominal & Gastrointestinal
            {
                id: 21, category: "Abdominal & Gastrointestinal",
                text: "A patient experiencing severe peritonitis from an acute abdomen will typically exhibit which type of breathing pattern to minimize pain?",
                options: [
                    { id: "A", text: "Deep and rapid" }, { id: "B", text: "Shallow and rapid" },
                    { id: "C", text: "Slow and deep" }, { id: "D", text: "Cheyne-Stokes" }
                ],
                correctAnswer: "B",
                explanation: "Deep breaths cause the diaphragm to push down on the inflamed peritoneum, causing severe pain. Patients take rapid, shallow breaths to avoid moving the abdominal organs."
            },
            {
                id: 22, category: "Abdominal & Gastrointestinal",
                text: "When assessing a patient with a severe acute abdomen, you will frequently find them in which of the following positions?",
                options: [
                    { id: "A", text: "Supine with legs fully extended" }, { id: "B", text: "Prone" },
                    { id: "C", text: "Lateral recumbent with knees drawn to the chest" }, { id: "D", text: "High Fowler's position" }
                ],
                correctAnswer: "C",
                explanation: "The fetal position relaxes the abdominal musculature and takes tension off the inflamed peritoneum, reducing pain."
            },
            {
                id: 23, category: "Abdominal & Gastrointestinal",
                text: "Eosinophilic esophagitis is an inflammatory condition of the esophagus most often triggered by:",
                options: [
                    { id: "A", text: "Viral infections" }, { id: "B", text: "Bacterial overgrowth" },
                    { id: "C", text: "Allergic reactions or food antigens" }, { id: "D", text: "Excessive alcohol consumption" }
                ],
                correctAnswer: "C",
                explanation: "Eosinophilic esophagitis is an immune-mediated disease where eosinophils (allergy-fighting white blood cells) build up in the esophagus, usually triggered by food allergies."
            },
            {
                id: 24, category: "Abdominal & Gastrointestinal",
                text: "In a patient with an inflammatory condition of the gastrointestinal tract driven by an allergic response, a complete blood count would likely reveal an elevation in which type of leukocyte?",
                options: [
                    { id: "A", text: "Neutrophils" }, { id: "B", text: "Eosinophils" },
                    { id: "C", text: "Basophils" }, { id: "D", text: "Lymphocytes" }
                ],
                correctAnswer: "B",
                explanation: "Eosinophils are the specific white blood cells responsible for responding to allergic reactions and parasitic infections."
            },
            {
                id: 25, category: "Abdominal & Gastrointestinal",
                text: "Crohn's disease most commonly affects which specific segment of the gastrointestinal tract?",
                options: [
                    { id: "A", text: "The terminal ileum" }, { id: "B", text: "The descending colon" },
                    { id: "C", text: "The duodenum" }, { id: "D", text: "The stomach" }
                ],
                correctAnswer: "A",
                explanation: "While Crohn's can affect any part of the GI tract from mouth to anus, it most commonly localizes in the terminal ileum (the end of the small intestine)."
            },
            {
                id: 26, category: "Abdominal & Gastrointestinal",
                text: "A patient with a known history of Crohn's disease is experiencing an acute exacerbation. They are most likely to report chronic pain localized to the:",
                options: [
                    { id: "A", text: "Right upper quadrant" }, { id: "B", text: "Left upper quadrant" },
                    { id: "C", text: "Right lower quadrant" }, { id: "D", text: "Epigastric region" }
                ],
                correctAnswer: "C",
                explanation: "Because Crohn's most frequently affects the terminal ileum, which is located in the right lower quadrant, pain is usually reported here (mimicking appendicitis)."
            },
            {
                id: 27, category: "Abdominal & Gastrointestinal",
                text: "During your abdominal exam, you press down firmly on the patient's abdomen and release quickly. The patient winces and cries out in pain upon release. This finding is known as:",
                options: [
                    { id: "A", text: "Kehr's sign" }, { id: "B", text: "Murphy's sign" },
                    { id: "C", text: "Rebound tenderness" }, { id: "D", text: "Guarding" }
                ],
                correctAnswer: "C",
                explanation: "Rebound tenderness (Blumberg's sign) is pain felt upon the release of pressure, indicating the inflamed peritoneum is 'snapping back' into place."
            },
            {
                id: 28, category: "Abdominal & Gastrointestinal",
                text: "Rebound tenderness is a reliable clinical indicator of:",
                options: [
                    { id: "A", text: "A hollow organ blockage" }, { id: "B", text: "Inflammation of the peritoneal lining" },
                    { id: "C", text: "Internal bleeding within the stomach" }, { id: "D", text: "A descending aortic aneurysm" }
                ],
                correctAnswer: "B",
                explanation: "Peritonitis makes the lining highly sensitive to movement. The rapid release of palpation causes the lining to shift, causing severe pain."
            },
            {
                id: 29, category: "Abdominal & Gastrointestinal",
                text: "The classic triad of symptoms frequently reported by patients experiencing an acute abdomen includes:",
                options: [
                    { id: "A", text: "Constipation, headache, and fever" }, { id: "B", text: "Nausea, vomiting, and abdominal pain" },
                    { id: "C", text: "Diarrhea, hematuria, and back pain" }, { id: "D", text: "Chest pain, diaphoresis, and shortness of breath" }
                ],
                correctAnswer: "B",
                explanation: "Nausea, vomiting, and abdominal pain are the three most common, classic symptoms of almost all acute gastrointestinal emergencies."
            },
            {
                id: 30, category: "Abdominal & Gastrointestinal",
                text: "Which combination of gastrointestinal symptoms should prompt an AEMT to maintain a high suspicion for an acute abdominal emergency?",
                options: [
                    { id: "A", text: "Increased appetite and weight gain" }, { id: "B", text: "Polyuria and polydipsia" },
                    { id: "C", text: "Anorexia, nausea, and abdominal pain" }, { id: "D", text: "Flatulence and frequent belching" }
                ],
                correctAnswer: "C",
                explanation: "Loss of appetite (anorexia) coupled with nausea and pain strongly suggests the GI tract has shut down due to an acute inflammatory or surgical emergency."
            },
            {
                id: 31, category: "Abdominal & Gastrointestinal",
                text: "If a patient has a condition that significantly impairs the function of their large intestine, they are most likely to present with:",
                options: [
                    { id: "A", text: "Undigested proteins in their stool" }, { id: "B", text: "Profound, watery diarrhea" },
                    { id: "C", text: "Severe hypoglycemia" }, { id: "D", text: "An inability to absorb fats" }
                ],
                correctAnswer: "B",
                explanation: "The main job of the large intestine is to absorb water from stool. If it fails, the water remains in the stool, resulting in diarrhea."
            },
            {
                id: 32, category: "Abdominal & Gastrointestinal",
                text: "What is the primary physiological role of the colon in the digestive system?",
                options: [
                    { id: "A", text: "Mechanical breakdown of food" }, { id: "B", text: "Secretion of digestive enzymes" },
                    { id: "C", text: "Absorption of water and electrolytes" }, { id: "D", text: "Absorption of primary nutrients and vitamins" }
                ],
                correctAnswer: "C",
                explanation: "By the time chyme reaches the colon, most nutrients are gone; the colon's job is to reclaim water and solidify waste."
            },
            {
                id: 33, category: "Abdominal & Gastrointestinal",
                text: "In the prehospital setting, the term 'acute abdomen' is most accurately used to describe:",
                options: [
                    { id: "A", text: "Any abdominal injury resulting from blunt force trauma" }, { id: "B", text: "A sudden onset of abdominal pain indicating a potentially life-threatening intra-abdominal condition" },
                    { id: "C", text: "Chronic abdominal discomfort lasting longer than 3 months" }, { id: "D", text: "Abdominal pain solely related to the female reproductive organs" }
                ],
                correctAnswer: "B",
                explanation: "'Acute abdomen' is a medical term for a sudden, severe abdominal condition that often requires surgical intervention (e.g., ruptured appendix, bowel perforation)."
            },
            {
                id: 34, category: "Abdominal & Gastrointestinal",
                text: "A defining characteristic of an acute abdomen that requires immediate evaluation is:",
                options: [
                    { id: "A", text: "Gradual onset of diffuse cramping" }, { id: "B", text: "Sudden, severe onset of pain indicating peritoneal irritation or organ compromise" },
                    { id: "C", text: "Pain that completely resolves after vomiting" }, { id: "D", text: "Pain that is only present upon deep palpation" }
                ],
                correctAnswer: "B",
                explanation: "Sudden, severe pain signifies a catastrophic event like a rupture, torsion, or ischemic bowel, requiring rapid transport and surgery."
            },

            // Section 3: Gynecologic & Renal
            {
                id: 35, category: "Gynecologic & Renal",
                text: "A 24-year-old female presents with sudden, sharp right lower quadrant pain and vaginal spotting. She states she has not had a period in 7 weeks. You should primarily suspect:",
                options: [
                    { id: "A", text: "Appendicitis" }, { id: "B", text: "Ectopic pregnancy" },
                    { id: "C", text: "Pelvic inflammatory disease" }, { id: "D", text: "Endometriosis" }
                ],
                correctAnswer: "B",
                explanation: "The triad of missed menses, unilateral lower quadrant pain, and vaginal spotting in a woman of childbearing age is an ectopic pregnancy until proven otherwise."
            },
            {
                id: 36, category: "Gynecologic & Renal",
                text: "Which of the following patient presentations carries the highest index of suspicion for a ruptured ectopic pregnancy?",
                options: [
                    { id: "A", text: "28-year-old female with bilateral lower quadrant pain and fever" }, { id: "B", text: "32-year-old female with unilateral lower abdominal pain, missed menses, and signs of shock" },
                    { id: "C", text: "45-year-old female with heavy vaginal bleeding and no abdominal pain" }, { id: "D", text: "18-year-old female with crampy pain during her menses" }
                ],
                correctAnswer: "B",
                explanation: "This is the classic presentation. The addition of shock (hypoperfusion) indicates the fallopian tube has ruptured and she is bleeding internally."
            },
            {
                id: 37, category: "Gynecologic & Renal",
                text: "You are managing a 26-year-old female with a suspected ruptured ectopic pregnancy. She is unresponsive with a respiratory rate of 6 breaths/min and a weak radial pulse of 140. Your immediate priority is to:",
                options: [
                    { id: "A", text: "Establish a large-bore IV" }, { id: "B", text: "Initiate positive pressure ventilation" },
                    { id: "C", text: "Administer an isotonic fluid bolus" }, { id: "D", text: "Apply a cardiac monitor" }
                ],
                correctAnswer: "B",
                explanation: "The patient is in profound shock and has an inadequate respiratory rate. In the ABCs, Airway and Breathing must be secured with a BVM before circulatory interventions (IVs)."
            },
            {
                id: 38, category: "Gynecologic & Renal",
                text: "A 30-year-old female with severe lower abdominal pain is pale, diaphoretic, and lethargic. Her blood pressure is 80/50 mmHg. After ensuring an open airway and adequate oxygenation, your next most appropriate AEMT intervention is to:",
                options: [
                    { id: "A", text: "Administer an antiemetic" }, { id: "B", text: "Obtain a 12-lead ECG" },
                    { id: "C", text: "Initiate isotonic crystalloid fluid resuscitation" }, { id: "D", text: "Administer narcotic pain medication" }
                ],
                correctAnswer: "C",
                explanation: "At the AEMT level, after ABCs, a hypotensive patient with suspected internal bleeding needs volume replacement to maintain a perfusing blood pressure en route to the surgeon."
            },
            {
                id: 39, category: "Gynecologic & Renal",
                text: "A history of which childhood illness is strongly associated with the later development of glomerulonephritis and chronic renal failure?",
                options: [
                    { id: "A", text: "Chickenpox" }, { id: "B", text: "Strep throat" },
                    { id: "C", text: "Mumps" }, { id: "D", text: "Respiratory syncytial virus" }
                ],
                correctAnswer: "B",
                explanation: "Group A Streptococcus infections (strep throat) can trigger an immune response where antibodies mistakenly attack the kidneys weeks later, causing post-streptococcal glomerulonephritis."
            },
            {
                id: 40, category: "Gynecologic & Renal",
                text: "Post-streptococcal glomerulonephritis is a condition that directly damages the filtering units of the:",
                options: [
                    { id: "A", text: "Liver" }, { id: "B", text: "Spleen" },
                    { id: "C", text: "Kidneys" }, { id: "D", text: "Pancreas" }
                ],
                correctAnswer: "C",
                explanation: "'Glomerulonephritis' literally translates to inflammation of the glomeruli, which are the microscopic filtering capillaries inside the kidneys."
            }
        ];

        // --- 2. STATE MANAGEMENT ---
        let gameState = "start"; // "start", "quiz", "results"
        let quizMode = null; // "review" (Option A) or "test" (Option B)
        let questions = [];
        let currentIndex = 0;
        let selectedAnswer = null;
        let isAnswered = false;
        
        let score = 0;
        let categoryStats = {};
        let userAnswers = {};

        // Helper: Shuffle Array
        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        // --- 3. ACTIONS ---
        function startQuiz(mode) {
            quizMode = mode;
            questions = shuffleArray(QUIZ_DATA);
            currentIndex = 0;
            selectedAnswer = null;
            isAnswered = false;
            score = 0;
            userAnswers = {};
            
            // Initialize category stats
            const initialStats = {};
            questions.forEach(q => {
                if (!initialStats[q.category]) {
                    initialStats[q.category] = { correct: 0, total: 0 };
                }
                initialStats[q.category].total += 1;
            });
            categoryStats = initialStats;
            gameState = "quiz";
            render();
        }

        function handleSelect(optionId) {
            if (quizMode === "review" && isAnswered) return;
            selectedAnswer = optionId;
            render();
        }

        function handleReviewSubmit() {
            if (!selectedAnswer || isAnswered) return;
            
            isAnswered = true;
            const currentQuestion = questions[currentIndex];
            const isCorrect = selectedAnswer === currentQuestion.correctAnswer;
            
            userAnswers[currentQuestion.id] = selectedAnswer;

            if (isCorrect) {
                score++;
                categoryStats[currentQuestion.category].correct++;
            }
            render();
        }

        function handleNext() {
            const currentQuestion = questions[currentIndex];

            if (quizMode === "test") {
                if (!selectedAnswer) return; 

                const isCorrect = selectedAnswer === currentQuestion.correctAnswer;
                userAnswers[currentQuestion.id] = selectedAnswer;

                if (isCorrect) {
                    score++;
                    categoryStats[currentQuestion.category].correct++;
                }
            }

            if (currentIndex + 1 < questions.length) {
                currentIndex++;
                selectedAnswer = null;
                isAnswered = false;
                render();
            } else {
                gameState = "results";
                render();
            }
        }

        function resetToStart() {
            gameState = "start";
            render();
        }

        // --- 4. RENDERERS ---
        function getCategoryIconHTML(category, extraClasses="") {
            switch (category) {
                case "Neurological Emergencies": return `<i data-lucide="brain" class="text-purple-500 ${extraClasses}"></i>`;
                case "Abdominal & Gastrointestinal": return `<i data-lucide="activity" class="text-orange-500 ${extraClasses}"></i>`;
                case "Gynecologic & Renal": return `<i data-lucide="stethoscope" class="text-teal-500 ${extraClasses}"></i>`;
                default: return `<i data-lucide="activity" class="text-blue-500 ${extraClasses}"></i>`;
            }
        }

        function renderStart() {
            return `
                <div class="flex items-center justify-center p-4 py-12">
                    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
                        <div class="text-center mb-10">
                            <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i data-lucide="stethoscope" class="w-10 h-10 text-blue-600"></i>
                            </div>
                            <h1 class="text-4xl font-bold text-slate-900 mb-4 tracking-tight">AEMT Exam Prep</h1>
                            <p class="text-lg text-slate-600 mb-2">
                                Test your knowledge across ${QUIZ_DATA.length} comprehensive questions covering Neurological, Abdominal, Gynecologic, and Renal emergencies.
                            </p>
                            <p class="text-md text-slate-500 italic">
                                Select a learning mode below to begin studying for your next Quiz.
                            </p>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- Option A -->
                            <button id="btn-start-review" class="text-left p-8 rounded-2xl border-2 border-slate-200 hover:border-blue-500 hover:bg-blue-50 transition-all group flex flex-col h-full">
                                <div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center mb-6 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                    <i data-lucide="book-open" class="w-7 h-7"></i>
                                </div>
                                <h2 class="text-2xl font-bold text-slate-800 mb-3">Option A: Review Mode</h2>
                                <p class="text-slate-600 flex-grow">
                                    Review each individual question. Get immediate feedback and a detailed explanation after locking in each answer choice. Great for active studying.
                                </p>
                            </button>

                            <!-- Option B -->
                            <button id="btn-start-test" class="text-left p-8 rounded-2xl border-2 border-slate-200 hover:border-emerald-500 hover:bg-emerald-50 transition-all group flex flex-col h-full">
                                <div class="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center mb-6 group-hover:bg-emerald-600 group-hover:text-white transition-colors">
                                    <i data-lucide="file-text" class="w-7 h-7"></i>
                                </div>
                                <h2 class="text-2xl font-bold text-slate-800 mb-3">Option B: Test Mode</h2>
                                <p class="text-slate-600 flex-grow">
                                    Take the full ${QUIZ_DATA.length}-question quiz consecutively. Correct answers and explanations are hidden until the end of the test. Great for exam simulation.
                                </p>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderQuiz() {
            const q = questions[currentIndex];
            const progress = (currentIndex / questions.length) * 100;

            let optionsHtml = q.options.map(opt => {
                const isSelected = selectedAnswer === opt.id;
                const isCorrectOption = opt.id === q.correctAnswer;
                
                let buttonClass = "option-btn w-full text-left p-4 rounded-xl border-2 transition-all flex items-center ";
                let circleClass = "flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center mr-4 font-bold ";
                let iconHtml = "";

                if (quizMode === "review" && isAnswered) {
                    if (isCorrectOption) {
                        buttonClass += "border-emerald-500 bg-emerald-50 text-emerald-900 font-medium cursor-default";
                        circleClass += "bg-emerald-500 text-white";
                        iconHtml = `<i data-lucide="check-circle" class="w-6 h-6 text-emerald-500 ml-2 flex-shrink-0"></i>`;
                    } else if (isSelected && !isCorrectOption) {
                        buttonClass += "border-rose-500 bg-rose-50 text-rose-900 cursor-default";
                        circleClass += "bg-rose-500 text-white";
                        iconHtml = `<i data-lucide="x-circle" class="w-6 h-6 text-rose-500 ml-2 flex-shrink-0"></i>`;
                    } else {
                        buttonClass += "border-slate-100 bg-slate-50 text-slate-400 opacity-60 cursor-default";
                        circleClass += "bg-slate-100 text-slate-400";
                    }
                } else {
                    if (isSelected) {
                        buttonClass += "border-blue-500 bg-blue-50 text-blue-900 shadow-sm";
                        circleClass += "bg-blue-500 text-white";
                    } else {
                        buttonClass += "border-slate-200 hover:border-blue-300 hover:bg-slate-50 text-slate-700";
                        circleClass += "bg-slate-100 text-slate-500";
                    }
                }

                return `
                    <button class="${buttonClass}" data-id="${opt.id}">
                        <div class="${circleClass}">${opt.id}</div>
                        <span class="flex-grow text-base">${opt.text}</span>
                        ${iconHtml}
                    </button>
                `;
            }).join('');

            let actionsHtml = "";
            if (quizMode === "review") {
                if (!isAnswered) {
                    const btnClass = selectedAnswer 
                        ? 'bg-blue-600 hover:bg-blue-700 text-white shadow-md cursor-pointer' 
                        : 'bg-slate-100 text-slate-400 cursor-not-allowed';
                    actionsHtml = `<button id="btn-lock" class="px-8 py-3 rounded-xl font-bold transition-all ${btnClass}">Lock in Answer</button>`;
                } else {
                    const btnText = (currentIndex + 1 === questions.length) ? 'View Results' : 'Next Question';
                    actionsHtml = `
                        <button id="btn-next" class="px-8 py-3 bg-slate-800 hover:bg-slate-900 text-white rounded-xl font-bold transition-all shadow-md flex items-center">
                            ${btnText} <i data-lucide="chevron-right" class="w-5 h-5 ml-2"></i>
                        </button>
                    `;
                }
            } else {
                // Test mode
                const btnClass = selectedAnswer 
                    ? 'bg-blue-600 hover:bg-blue-700 text-white shadow-md cursor-pointer' 
                    : 'bg-slate-100 text-slate-400 cursor-not-allowed';
                const btnText = (currentIndex + 1 === questions.length) ? 'Submit Exam' : 'Next Question';
                const chevronHtml = selectedAnswer ? `<i data-lucide="chevron-right" class="w-5 h-5 ml-2"></i>` : '';
                actionsHtml = `
                    <button id="btn-next" class="px-8 py-3 rounded-xl font-bold transition-all flex items-center ${btnClass}">
                        ${btnText} ${chevronHtml}
                    </button>
                `;
            }

            let explanationHtml = "";
            if (quizMode === "review" && isAnswered) {
                const isCorrect = selectedAnswer === q.correctAnswer;
                const bgClass = isCorrect ? 'bg-emerald-50/50' : 'bg-rose-50/50';
                const textClass = isCorrect ? 'text-emerald-800' : 'text-rose-800';
                const heading = isCorrect ? 'Correct!' : 'Incorrect.';
                
                explanationHtml = `
                    <div class="p-6 sm:p-8 ${bgClass} border-t border-slate-100">
                        <h3 class="font-bold text-lg flex items-center mb-3 ${textClass}">${heading}</h3>
                        <div class="text-slate-700 leading-relaxed bg-white p-5 rounded-xl border border-slate-200/60 shadow-sm">
                            <p><strong class="text-slate-900">Explanation:</strong> ${q.explanation}</p>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="py-8 px-4 sm:px-6">
                    <div class="max-w-3xl mx-auto">
                        <div class="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
                            <div class="w-full">
                                <div class="flex justify-between items-end mb-2">
                                    <span class="text-sm font-semibold text-slate-500 uppercase tracking-wider">
                                        Question ${currentIndex + 1} of ${questions.length}
                                        <span class="ml-2 lowercase text-slate-400 font-normal">(${quizMode} mode)</span>
                                    </span>
                                    <div class="flex items-center bg-white px-3 py-1 rounded-full shadow-sm border border-slate-200 text-sm font-medium">
                                        ${getCategoryIconHTML(q.category, "w-5 h-5")}
                                        <span class="ml-2 text-slate-600 hidden sm:inline-block">${q.category}</span>
                                    </div>
                                </div>
                                <div class="w-full bg-slate-200 rounded-full h-2">
                                    <div class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: ${progress}%"></div>
                                </div>
                            </div>
                            <button id="btn-quit" class="text-xs font-semibold text-slate-400 hover:text-slate-600 transition-colors uppercase flex-shrink-0">
                                Quit
                            </button>
                        </div>

                        <div class="bg-white rounded-2xl shadow-lg border border-slate-100 overflow-hidden">
                            <div class="p-6 sm:p-8">
                                <h2 class="text-xl sm:text-2xl font-bold text-slate-900 leading-snug mb-8">
                                    ${q.text}
                                </h2>
                                <div class="space-y-3">
                                    ${optionsHtml}
                                </div>
                                <div class="mt-8 pt-6 border-t border-slate-100 flex justify-end">
                                    ${actionsHtml}
                                </div>
                            </div>
                            ${explanationHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderResults() {
            const percentage = Math.round((score / questions.length) * 100);
            const missedQuestions = questions.filter(q => userAnswers[q.id] !== q.correctAnswer);

            let statsHtml = Object.keys(categoryStats).map(cat => {
                const stats = categoryStats[cat];
                const catPercent = Math.round((stats.correct / stats.total) * 100);
                const isWeak = catPercent < 75;
                
                const boxClass = isWeak ? 'bg-rose-50 border-rose-200' : 'bg-slate-50 border-slate-200';
                const textClass = isWeak ? 'text-rose-600' : 'text-slate-700';
                const barClass = isWeak ? 'bg-rose-500' : 'bg-emerald-500';

                let alertHtml = isWeak ? `
                    <div class="flex items-start mt-3 text-sm text-rose-700 bg-white p-3 rounded-lg border border-rose-100">
                        <i data-lucide="alert-circle" class="w-4 h-4 mr-2 mt-0.5 flex-shrink-0"></i>
                        <p><strong>Weak Theme Identified:</strong> You scored below 75% in this area. Consider reviewing your protocols and textbook chapters regarding ${cat.toLowerCase()} before your next assessment.</p>
                    </div>
                ` : "";

                return `
                    <div class="p-4 rounded-xl border ${boxClass}">
                        <div class="flex justify-between items-center mb-2">
                            <div class="flex items-center space-x-2">
                                ${getCategoryIconHTML(cat, "w-5 h-5")}
                                <span class="font-semibold text-slate-700">${cat}</span>
                            </div>
                            <span class="font-bold ${textClass}">
                                ${stats.correct} / ${stats.total} (${catPercent}%)
                            </span>
                        </div>
                        <div class="w-full bg-slate-200 rounded-full h-2.5 mb-2">
                            <div class="h-2.5 rounded-full ${barClass}" style="width: ${catPercent}%"></div>
                        </div>
                        ${alertHtml}
                    </div>
                `;
            }).join('');

            let reviewHtml = "";
            if (missedQuestions.length > 0) {
                let itemsHtml = missedQuestions.map(q => {
                    const selectedOpt = q.options.find(o => o.id === userAnswers[q.id]);
                    const correctOpt = q.options.find(o => o.id === q.correctAnswer);
                    const selectedText = selectedOpt ? `${selectedOpt.id}) ${selectedOpt.text}` : "No Answer Selected";
                    
                    return `
                        <div class="bg-white p-6 rounded-xl border border-rose-100 shadow-sm relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1 h-full bg-rose-400"></div>
                            <p class="font-bold text-slate-800 mb-4 pl-3">${q.text}</p>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5 pl-3">
                                <div class="p-3 bg-rose-50 border border-rose-200 rounded-lg">
                                    <span class="text-rose-800 font-bold text-xs uppercase tracking-wider block mb-1">You Selected:</span>
                                    <span class="text-rose-900">${selectedText}</span>
                                </div>
                                <div class="p-3 bg-emerald-50 border border-emerald-200 rounded-lg">
                                    <span class="text-emerald-800 font-bold text-xs uppercase tracking-wider block mb-1">Correct Answer:</span>
                                    <span class="text-emerald-900">${correctOpt.id}) ${correctOpt.text}</span>
                                </div>
                            </div>
                            
                            <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 pl-3 ml-3">
                                <p class="text-sm text-slate-700 leading-relaxed"><strong>Explanation:</strong> ${q.explanation}</p>
                            </div>
                        </div>
                    `;
                }).join('');

                reviewHtml = `
                    <div class="mt-12 border-t pt-8">
                        <h3 class="text-xl font-bold text-slate-800 mb-6 flex items-center">
                            <i data-lucide="book-open" class="w-6 h-6 mr-3 text-blue-600"></i>
                            Review Missed Questions
                        </h3>
                        <div class="space-y-8">
                            ${itemsHtml}
                        </div>
                    </div>
                `;
            }

            return `
                <div class="py-12 px-4 sm:px-6 lg:px-8">
                    <div class="max-w-4xl mx-auto">
                        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
                            <div class="bg-blue-600 px-8 py-10 text-center text-white">
                                <h2 class="text-3xl font-bold mb-2">Quiz Complete!</h2>
                                <div class="text-6xl font-extrabold mb-2">${percentage}%</div>
                                <p class="text-blue-100 text-lg">You scored ${score} out of ${questions.length} correctly.</p>
                            </div>
                            
                            <div class="p-8">
                                <h3 class="text-xl font-bold text-slate-800 mb-6 border-b pb-2">Category Breakdown</h3>
                                <div class="space-y-6">
                                    ${statsHtml}
                                </div>

                                ${reviewHtml}

                                <div class="mt-10 pt-8 border-t flex justify-center">
                                    <button id="btn-reset" class="inline-flex items-center justify-center px-8 py-4 bg-slate-800 hover:bg-slate-900 text-white font-semibold rounded-xl transition-all shadow-md transform hover:-translate-y-0.5">
                                        <i data-lucide="refresh-cw" class="w-5 h-5 mr-3"></i>
                                        Reset & Select Mode
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- 5. RENDER MANAGER & EVENT LISTENERS ---
        function render() {
            const app = document.getElementById('app');
            
            if (gameState === "start") {
                app.innerHTML = renderStart();
            } else if (gameState === "quiz") {
                app.innerHTML = renderQuiz();
            } else if (gameState === "results") {
                app.innerHTML = renderResults();
            }

            // After painting DOM, render lucide icons
            lucide.createIcons();
            attachEventListeners();
        }

        function attachEventListeners() {
            if (gameState === "start") {
                document.getElementById('btn-start-review').addEventListener('click', () => startQuiz('review'));
                document.getElementById('btn-start-test').addEventListener('click', () => startQuiz('test'));
            } 
            else if (gameState === "quiz") {
                // Options
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.currentTarget.getAttribute('data-id');
                        handleSelect(id);
                    });
                });

                // Action buttons
                const lockBtn = document.getElementById('btn-lock');
                if (lockBtn) lockBtn.addEventListener('click', handleReviewSubmit);

                const nextBtn = document.getElementById('btn-next');
                if (nextBtn) nextBtn.addEventListener('click', handleNext);

                const quitBtn = document.getElementById('btn-quit');
                if (quitBtn) quitBtn.addEventListener('click', resetToStart);
            } 
            else if (gameState === "results") {
                document.getElementById('btn-reset').addEventListener('click', resetToStart);
            }
        }

        // --- 6. INITIALIZATION ---
        // Start the application
        document.addEventListener('DOMContentLoaded', () => {
            render();
        });
    </script>
</body>
</html>
